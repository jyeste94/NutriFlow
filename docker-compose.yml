version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: nutriflow-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-nutriflow}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nutriflow-net

  app:
    build: .
    container_name: nutriflow-api
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - DATABASE_URL=postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-nutriflow}?sslmode=disable
      - FOOD_CACHE_TTL_DAYS=${FOOD_CACHE_TTL_DAYS:-30}
      - FATSECRET_CLIENT_ID=${FATSECRET_CLIENT_ID}
      - FATSECRET_CLIENT_SECRET=${FATSECRET_CLIENT_SECRET}
    depends_on:
      - db
    networks:
      - nutriflow-net

volumes:
  postgres_data:

networks:
  nutriflow-net:
    driver: bridge
